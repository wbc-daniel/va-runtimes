steps:
  copy_flutter:
    operations:
      - type: copy
        src: ../animations/vector_animate_flutter
        dest: packages/flutter
        hash_check: true
        ignore:
          - "*.map"
          - "*.md"
          - ".claude"
          - "example"
          - "test"
          - ".dart_tool"
          - "build"
          - "LICENSE"
          - "pubspec.lock"

  publish_flutter:
    version_from: ../animations/vector_animate_flutter/pubspec.yaml
    only_if_changes: true
    operations:
      - type: commit
        message: "chore: publish flutter {{version}}"
      - type: create_tag
        tag: "vector_animate_flutter-v{{version}}"
        message: "Flutter release {{version}}"
      - type: push
        remote: origin
        branch: main
      - type: push_tags
        remote: origin

  copy_web:
    operations:
      - type: copy
        src: ../animations/vector_animate_web/dist
        dest: packages/web
        hash_check: true

  publish_web:
    version_from: ../animations/vector_animate_web/package.json
    only_if_changes: true
    operations:
      - type: commit
        message: "chore: publish web app {{version}}"
      - type: create_tag
        tag: "vector_animate_web-v{{version}}"
        message: "Web app release {{version}}"
      - type: push
        remote: origin
        branch: main
      - type: push_tags
        remote: origin
